name: Publish dbt docs (GitHub Pages)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Start Postgres
        run: docker compose up -d postgres

      - name: Wait for Postgres
        shell: bash
        run: |
          set -euo pipefail
          for i in {1..60}; do
            if docker compose exec -T postgres pg_isready -U energy -d wattsup >/dev/null 2>&1; then
              echo "Postgres is ready."
              exit 0
            fi
            sleep 2
          done
          echo "Postgres did not become ready in time."
          docker compose logs postgres
          exit 1

      - name: Generate dbt docs
        run: docker compose run --rm dbt docs generate

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dbt/wattsup/target

      - name: Teardown
        if: always()
        run: docker compose down -v

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4